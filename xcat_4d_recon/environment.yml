name: xcat4d
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - scikit-image>=0.21
  - nibabel>=5.1
  - matplotlib>=3.7
  - tqdm>=4.65
  - pyyaml>=6.0
  - pytest>=7.4
  # PyTorch (CPU) — change to pytorch-cuda=12.1 for GPU
  - pytorch>=2.1
  - cpuonly
  - pip
  - pip:
    - geomloss>=0.2.6
    - k-means-constrained>=0.7.3
    - teaspoon>=1.4.0
